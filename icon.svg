<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f4c8a"/>
      <stop offset="100%" style="stop-color:#082d57"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="100%" style="stop-color:#c5e1f5"/>
    </linearGradient>
    <linearGradient id="dbTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#0288d1"/>
    </linearGradient>
    <linearGradient id="dbBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0277bd"/>
      <stop offset="100%" style="stop-color:#01579b"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="122" fill="url(#bgGrad)"/>
  <circle cx="128" cy="128" r="115" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="2"/>

  <!-- Cloud shape (white, behind everything) -->
  <path d="
    M 90 155
    a 26 26 0 0 1 -2 -52
    a 2 2 0 0 1 0 -1
    a 34 34 0 0 1 66 -6
    a 22 22 0 0 1 2 44
    Z
  " fill="url(#cloudGrad)" opacity="0.22"/>

  <!-- Database cylinder -->
  <!-- Bottom cap -->
  <ellipse cx="128" cy="158" rx="30" ry="9" fill="#014f86"/>
  <!-- Body -->
  <rect x="98" y="112" width="60" height="46" fill="url(#dbBody)"/>
  <!-- Mid seam -->
  <ellipse cx="128" cy="135" rx="30" ry="9" fill="none" stroke="#4fc3f7" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Top cap -->
  <ellipse cx="128" cy="112" rx="30" ry="9" fill="url(#dbTop)"/>
  <!-- Shine on top -->
  <ellipse cx="120" cy="110" rx="12" ry="4" fill="#ffffff" fill-opacity="0.25"/>

  <!-- Restore / sync arrow around the DB -->
  <path d="M 93 175 A 42 42 0 1 0 167 183"
        fill="none" stroke="#4fc3f7" stroke-width="7" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="159,170 170,187 177,171" fill="#4fc3f7"/>

  <!-- Cloud accent dots (scale indicators, top right) -->
  <circle cx="186" cy="72" r="5" fill="#4fc3f7" opacity="0.7"/>
  <circle cx="200" cy="60" r="4" fill="#4fc3f7" opacity="0.5"/>
  <circle cx="210" cy="75" r="3" fill="#4fc3f7" opacity="0.35"/>

</svg>
